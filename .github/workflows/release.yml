name: Release

on:
  push:
    tags:
      - "v*"
  # Manual runs build the bundles (named after the branch) without publishing.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS bundle (universal)
    # Pinned: the macos-latest label is migrating to macOS 26 during 2026
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      # The embedded Postgres Language Server generates its tree-sitter
      # grammar at build time and needs the CLI on PATH.
      - name: Install tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2
        with:
          tree-sitter-ref: v0.25.9

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build both architectures
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: Bundle pg-gui.app
        run: cargo bundle --release --target aarch64-apple-darwin

      - name: Make the app binary universal
        run: |
          app="target/aarch64-apple-darwin/release/bundle/osx/pg-gui.app"
          lipo -create \
            target/aarch64-apple-darwin/release/pg-gui \
            target/x86_64-apple-darwin/release/pg-gui \
            -output "$app/Contents/MacOS/pg-gui"
          lipo -info "$app/Contents/MacOS/pg-gui"

      - name: Zip the app
        run: |
          ditto -c -k --keepParent \
            "target/aarch64-apple-darwin/release/bundle/osx/pg-gui.app" \
            "pg-gui-${GITHUB_REF_NAME}-macos-universal.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-bundle
          path: pg-gui-*.zip
          if-no-files-found: error

  linux:
    name: Linux bundle (x86_64)
    # 22.04 keeps the glibc requirement low for older distros
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libasound2-dev \
            libssl-dev \
            clang \
            libclang-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The embedded Postgres Language Server generates its tree-sitter
      # grammar at build time and needs the CLI on PATH.
      - name: Install tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2
        with:
          tree-sitter-ref: v0.25.9

      - name: Build
        run: cargo build --release

      - name: Package tarball
        run: |
          dir="pg-gui-${GITHUB_REF_NAME}-x86_64-linux"
          mkdir "$dir"
          cp target/release/pg-gui "$dir/"
          cp README.md assets/icon.png "$dir/"
          tar -czf "$dir.tar.gz" "$dir"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: pg-gui-*.tar.gz
          if-no-files-found: error

  windows:
    name: Windows bundle (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The embedded Postgres Language Server generates its tree-sitter
      # grammar at build time and needs the CLI on PATH.
      - name: Install tree-sitter CLI
        uses: tree-sitter/setup-action/cli@v2
        with:
          tree-sitter-ref: v0.25.9

      - name: Build
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: |
          $dir = "pg-gui-$env:GITHUB_REF_NAME-x86_64-windows"
          New-Item -ItemType Directory -Path $dir | Out-Null
          Copy-Item target/release/pg-gui.exe, README.md, assets/icon.png $dir
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-bundle
          path: pg-gui-*windows.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            pg-gui-*.zip
            pg-gui-*.tar.gz
          generate_release_notes: true
